version: "3.9"

services:
  backend:
    build: .
    container_name: rag_backend
    ports:
      - "8300:8300"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./backend:/app                   # dev hot-reload
      - ./data/hf_cache:/root/.cache/huggingface  # persist HF dataset cache
    depends_on:
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 6G                     # ingestion peaks at ~4 GB during HF dataset load
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.0          # native x86_64, AVX2-accelerated
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: 0
      QDRANT__STORAGE__HNSW_INDEX__M: 16
      QDRANT__STORAGE__HNSW_INDEX__EF_CONSTRUCT: 200
    deploy:
      resources:
        limits:
          memory: 8G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
