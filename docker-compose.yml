services:
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: internal-chatbot
    restart: unless-stopped
    ports:
      - "8300:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - COMPANY_NAME=${COMPANY_NAME:-Công ty}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - TOP_K=${TOP_K:-5}
      - SQLITE_PATH=${SQLITE_PATH:-/data/sqlite/chatbot.db}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET:-change-me}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_TLS=${SMTP_TLS:-true}
      - NOTIFY_EMAILS=${NOTIFY_EMAILS:-}
    volumes:
      - ./data/sqlite:/data/sqlite    # SQLite DB (sessions/feedback/admins)
      - ./data/docs:/data/docs        # Thả PDF vào đây
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.9.0        # native x86_64 image — SIMD AVX2 enabled
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"                    # gRPC port — leave open for future use
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      # Performance tuning for server hardware
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: 0    # 0 = use all cores
      QDRANT__STORAGE__OPTIMIZERS__INDEXING_THRESHOLD: 20000 # build HNSW index after 20k vectors
      QDRANT__STORAGE__HNSW_INDEX__M: 16                     # HNSW M parameter (16 = balanced)
      QDRANT__STORAGE__HNSW_INDEX__EF_CONSTRUCT: 200         # build quality (higher = better recall)
      QDRANT__STORAGE__WAL__WAL_SEGMENTS_AHEAD: 0
    deploy:
      resources:
        limits:
          memory: 8G                   # cap at 8 GB — adjust to your RAM
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
