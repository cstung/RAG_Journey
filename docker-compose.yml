services:
  chatbot:
    build: ./backend
    container_name: internal-chatbot
    restart: unless-stopped
    ports:
      - "8300:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - COMPANY_NAME=${COMPANY_NAME:-Công ty}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - TOP_K=${TOP_K:-5}
      - SQLITE_PATH=${SQLITE_PATH:-/data/sqlite/chatbot.db}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET:-change-me}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_TLS=${SMTP_TLS:-true}
      - NOTIFY_EMAILS=${NOTIFY_EMAILS:-}
    volumes:
      - ./data/sqlite:/data/sqlite    # SQLite DB (sessions/feedback/admins)
      - ./data/docs:/data/docs        # Thả PDF vào đây
      - ./data/chroma:/data/chroma    # Vector DB tự lưu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
